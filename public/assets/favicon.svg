<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
<style>
  .ff-light{display:inline}
  .ff-dark{display:none}
  @media (prefers-color-scheme: dark){
    .ff-light{display:none}
    .ff-dark{display:inline}
  }
</style>
<image class="ff-light" href="data:image/png;base64," width="128" height="128"/>
<image class="ff-dark" href="data:image/png;base64," width="128" height="128"/>
</svg>